<!-- Favicon — default (light mode) + dark variant -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" id="favicon">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" id="favicon-apple">

<!-- Prevent FOUC: apply saved theme + correct favicon before any paint -->
<script>
(function() {
  var t = localStorage.getItem('reprodb-theme');
  if (t === 'dark' || t === 'light') {
    document.documentElement.setAttribute('data-theme', t);
  }
  var isDark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if (isDark) {
    var base = '{{ "/" | relative_url }}';
    document.getElementById('favicon').href = base + 'assets/images/favicon-dark.svg';
    document.getElementById('favicon-apple').href = base + 'assets/images/favicon-dark.svg';
  }
})();
</script>

<!-- Content Security Policy
     Allows: self-hosted assets, inline scripts/styles (used by Minimal Mistakes
     theme + per-page data-loading scripts), CDN-hosted flag-icons CSS, and
     HTTPS images. All JS is self-hosted. -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com data:;
               img-src 'self' data: https:;
               connect-src 'self';
               object-src 'none';
               base-uri 'self';
               form-action 'self';
               frame-ancestors 'self'">

<!-- ReproDB shared assets (utils, table widget, lightweight SVG Chart shim) -->
<link rel="stylesheet" href="{{ '/assets/css/reprodb-table.css' | relative_url }}">
<script src="{{ '/assets/js/reprodb-utils.js' | relative_url }}"></script>
<script src="{{ '/assets/js/reprodb-table.js' | relative_url }}"></script>
<script src="{{ '/assets/js/reprodb-chart.js' | relative_url }}"></script>
